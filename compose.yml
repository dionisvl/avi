services:
  traefik:
    image: traefik:v3.6
    command:
      - "--providers.docker=true"
      - "--providers.docker.constraints=Label(`com.docker.compose.oneoff`,`False`)"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--ping=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - avi
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ./api-go
      dockerfile: Dockerfile
    env_file:
      - .env
      - path: ./api-go/.env
        required: false
    expose:
      - "8080"
    networks:
      - avi
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --timeout=2 http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

  fe-admin:
    build:
      context: ./fe-admin
      dockerfile: Dockerfile
    expose:
      - "80"
    networks:
      - avi
    restart: unless-stopped
    environment:
      - API_URL=${API_URL}
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./fe-admin/dist:/usr/share/nginx/html
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --timeout=2 http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.fe-admin.loadbalancer.server.port=80"

  fe-nextjs:
    build:
      context: ./fe-nextjs
      dockerfile: Dockerfile
    expose:
      - "3000"
    networks:
      - avi
    restart: unless-stopped
    environment:
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://api:8080}
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:18.3-alpine
    command: postgres -c shared_buffers=256MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-avi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avi}
      POSTGRES_DB: ${POSTGRES_DB:-avi}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - avi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avi} -d ${POSTGRES_DB:-avi}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "8080"
    networks:
      - avi
    restart: unless-stopped
    secrets:
      - source: dozzle_users
        target: /data/users.yml
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"

  netdata:
    image: netdata/netdata:v2.10.2
    # dev-only metrics dashboard — activated via COMPOSE_PROFILES=dev (see Makefile).
    profiles:
      - dev
    hostname: avi-netdata
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    expose:
      - "19999"
    networks:
      - avi
    restart: unless-stopped
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/log:/host/var/log:ro
      # NOTE: the host root mount (/:/host/root:ro,rslave) needs a shared/slave
      # mount on the host and only works on Linux — it's added in the prod override.
    environment:
      # Empty token = standalone agent, no Netdata Cloud connection.
      - NETDATA_CLAIM_TOKEN=
    # The image ships its own HEALTHCHECK (/usr/sbin/health.sh -> /api/v1/info), so we don't define one here.
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.netdata.loadbalancer.server.port=19999"

secrets:
  dozzle_users:
    file: ./tools/dozzle_users.yml

networks:
  avi:

volumes:
  postgres_data:
  netdataconfig:
  netdatalib:
  netdatacache:
