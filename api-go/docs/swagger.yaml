host: localhost:8080
info:
  contact: {}
  description: |-
    Demo classifieds marketplace API (C2C listings: items, categories, favorites, chat, listing promotion).
    Not affiliated with Avito, OLX, or any other classifieds platform.
  title: Classifieds Marketplace API
  version: "1.0"
paths:
  /api/v1/auth/change-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Current and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_auth.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_dionisvl_classifieds_api-go_internal_api.ProblemDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_dionisvl_classifieds_api-go_internal_api.ProblemDetails'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
