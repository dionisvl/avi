# Deploy alongside an existing shared Traefik (it owns :80/:443) instead of
# shipping our own. Enable via .env COMPOSE_FILE + EXTERNAL_TRAEFIK_NETWORK.

services:
  traefik:
    profiles:
      - _disabled

  api:
    build:
      context: ./api-go
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
    networks:
      - avi
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EXTERNAL_TRAEFIK_NETWORK}"
      - "traefik.http.services.avi-api.loadbalancer.server.port=8080"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.avi-api-http.entrypoints=web"
      - "traefik.http.routers.avi-api-http.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.avi-api-http.middlewares=avi-api-redirect-https"
      - "traefik.http.middlewares.avi-api-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.avi-api-redirect-https.redirectscheme.permanent=true"
      # HTTPS
      - "traefik.http.routers.avi-api-secure.entrypoints=websecure"
      - "traefik.http.routers.avi-api-secure.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.avi-api-secure.service=avi-api"
      - "traefik.http.routers.avi-api-secure.tls.certresolver=${TRAEFIK_CERTRESOLVER}"

  fe-admin:
    build:
      context: ./fe-admin
      dockerfile: Dockerfile
    networks:
      - avi
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EXTERNAL_TRAEFIK_NETWORK}"
      - "traefik.http.services.avi-fe-admin.loadbalancer.server.port=80"
      - "traefik.http.routers.avi-fe-admin-http.entrypoints=web"
      - "traefik.http.routers.avi-fe-admin-http.rule=Host(`${FRONTEND_ADMIN_DOMAIN}`)"
      - "traefik.http.routers.avi-fe-admin-http.middlewares=avi-fe-admin-redirect-https"
      - "traefik.http.middlewares.avi-fe-admin-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.avi-fe-admin-redirect-https.redirectscheme.permanent=true"
      - "traefik.http.routers.avi-fe-admin-secure.entrypoints=websecure"
      - "traefik.http.routers.avi-fe-admin-secure.rule=Host(`${FRONTEND_ADMIN_DOMAIN}`)"
      - "traefik.http.routers.avi-fe-admin-secure.service=avi-fe-admin"
      - "traefik.http.routers.avi-fe-admin-secure.tls.certresolver=${TRAEFIK_CERTRESOLVER}"

  fe-nextjs:
    build:
      context: ./fe-nextjs
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
        NEXT_PUBLIC_APP_URL: https://${FRONTEND_DOMAIN}
        NEXT_PUBLIC_S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
        NEXT_PUBLIC_IMAGE_HOSTS: ${NEXT_PUBLIC_IMAGE_HOSTS:-}
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
        NEXT_PUBLIC_DEMO_USERS: ${NEXT_PUBLIC_DEMO_USERS:-[]}
        NEXT_PUBLIC_MAILPIT_URL: ${NEXT_PUBLIC_MAILPIT_URL:-}
    networks:
      - avi
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EXTERNAL_TRAEFIK_NETWORK}"
      - "traefik.http.services.avi-fe-nextjs.loadbalancer.server.port=3000"
      - "traefik.http.routers.avi-fe-nextjs-http.entrypoints=web"
      - "traefik.http.routers.avi-fe-nextjs-http.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.avi-fe-nextjs-http.middlewares=avi-fe-nextjs-redirect-https"
      - "traefik.http.middlewares.avi-fe-nextjs-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.avi-fe-nextjs-redirect-https.redirectscheme.permanent=true"
      - "traefik.http.routers.avi-fe-nextjs-secure.entrypoints=websecure"
      - "traefik.http.routers.avi-fe-nextjs-secure.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.avi-fe-nextjs-secure.service=avi-fe-nextjs"
      - "traefik.http.routers.avi-fe-nextjs-secure.tls.certresolver=${TRAEFIK_CERTRESOLVER}"

  db:
    restart: unless-stopped

  dozzle:
    environment:
      - DOZZLE_AUTH_PROVIDER=simple
    volumes:
      - ./Tools/dozzle_users.yml:/data/users.yml:ro
    networks:
      - avi
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EXTERNAL_TRAEFIK_NETWORK}"
      - "traefik.http.services.avi-dozzle.loadbalancer.server.port=8080"
      - "traefik.http.routers.avi-dozzle-http.entrypoints=web"
      - "traefik.http.routers.avi-dozzle-http.rule=Host(`${LOGS_DOMAIN}`)"
      - "traefik.http.routers.avi-dozzle-http.middlewares=avi-dozzle-redirect-https"
      - "traefik.http.middlewares.avi-dozzle-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.avi-dozzle-redirect-https.redirectscheme.permanent=true"
      - "traefik.http.routers.avi-dozzle-secure.entrypoints=websecure"
      - "traefik.http.routers.avi-dozzle-secure.rule=Host(`${LOGS_DOMAIN}`)"
      - "traefik.http.routers.avi-dozzle-secure.service=avi-dozzle"
      - "traefik.http.routers.avi-dozzle-secure.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.avi-dozzle-secure.middlewares=avi-dozzle-auth"
      - "traefik.http.middlewares.avi-dozzle-auth.basicauth.users=${HTTP_BASIC_AUTH_HASH}"

networks:
  avi:
    external: true
    name: ${EXTERNAL_TRAEFIK_NETWORK}
